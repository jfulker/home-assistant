# =========================================
# 1. DECLUTTERING TEMPLATES
# =========================================
decluttering_templates:

  sidebar_menu:
    default:
      - home_border: "transparent"
      - climate_border: "transparent"
      - kitchen_border: "transparent"
      - living_border: "transparent"
      - backyard_border: "transparent"
    card:
      type: vertical-stack
      cards:
        - type: custom:decluttering-card
          template: spacer
        - type: custom:decluttering-card
          template: clock_card
        - type: custom:decluttering-card
          template: nav_item
          variables:
            - name: "Home"
            - path: "home"
            - border: "[[home_border]]"
        - type: custom:decluttering-card
          template: nav_item
          variables:
            - name: "Climate"
            - path: "climate"
            - border: "[[climate_border]]"
        - type: custom:decluttering-card
          template: nav_item
          variables:
            - name: "Kitchen"
            - path: "kitchen"
            - border: "[[kitchen_border]]"
        - type: custom:decluttering-card
          template: nav_item
          variables:
            - name: "Living Room"
            - path: "living-room"
            - border: "[[living_border]]"
        - type: custom:decluttering-card
          template: nav_item
          variables:
            - name: "Back Yard"
            - path: "back-yard"
            - border: "[[backyard_border]]"

  spacer:
    card:
      type: custom:button-card
      show_name: false
      show_icon: false
      card_mod:
        style: |
          :host { margin: 0 !important; }
      styles:
        card:
          - background: transparent
          - box-shadow: none
          - height: 20px
          - padding: 0
          - margin: 0

  clock_card:
    card:
      type: custom:button-card
      show_name: false
      show_icon: false
      show_label: true
      label: >
        [[[
          var d = new Date();
          var h = (d.getHours() % 12 || 12).toString();
          var m = d.getMinutes().toString().padStart(2,'0');
          return '<div style="font-size:58pt;font-weight:200;color:oklch(20% 0.018 45);line-height:1;letter-spacing:-2px;font-family:Roboto,sans-serif;">' + h + ':' + m + '</div>';
        ]]]
      card_mod:
        style: |
          :host { margin: 0 !important; }
          div#root { justify-content: flex-start !important; row-gap: 0 !important; align-items: flex-start !important; }
          #label { text-align: left !important; padding: 0 !important; width: 100% !important; }
      styles:
        card:
          - background: transparent
          - box-shadow: none
          - padding: 0
          - margin-bottom: 28px
          - margin-left: 12px
          - justify-content: flex-start
          - align-items: flex-start
        label:
          - text-align: left
          - width: 100%
          - display: block
          - padding: 0

  nav_item:
    card:
      type: custom:button-card
      name: "[[name]]"
      show_icon: false
      tap_action:
        action: navigate
        navigation_path: /dashboard-home/[[path]]
      card_mod:
        style: |
          :host { margin: 0 !important; }
          ha-card {
            border-left: 4px solid [[border]] !important;
            border-radius: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
          }
      styles:
        card:
          - padding: 26px 12px
          - min-height: 78px
          - justify-content: flex-start
          - align-items: center
          - margin: 0
        name:
          - font-size: 24px
          - font-weight: 400
          - color: "oklch(20% 0.018 45)"
          - text-align: left
          - width: 100%
          - display: block

  footer:
    card:
      type: custom:button-card
      show_name: false
      show_icon: false
      view_layout:
        grid-column: 1 / 3
        grid-row: 2
      styles:
        card:
          - background: "rgba(255, 255, 255, 0.4)"
          - border-radius: 0
          - box-shadow: none
          - height: 160px
          - padding: 0
          - position: relative
        custom_fields:
          pills:
            - position: absolute
            - top: 0
            - left: 0
            - right: 0
            - bottom: 0
            - display: block
      custom_fields:
        pills: |
          [[[
            var w = states['weather.forecast_home'];
            var temp = w ? w.attributes.temperature + '°' : '--';
            var state = w ? w.state : 'sunny';
            var condMap = {'clear-night':'Clear','sunny':'Sunny','partlycloudy':'Partly Cloudy','cloudy':'Cloudy','rainy':'Rainy','pouring':'Heavy Rain','snowy':'Snowy','windy':'Windy','fog':'Foggy','lightning':'Stormy','snowy-rainy':'Sleet','hail':'Hail'};
            var cond = condMap[state] || state;
            var sun = states['sun.sun'];
            var isNight = sun && sun.state === 'below_horizon';
            var iconFile = (state === 'partlycloudy' && isNight) ? 'partly-cloudy-night' : state;
            var iconSrc = `/local/weather_icons/${iconFile}.svg`;
            
            var gr = {'sunny':'linear-gradient(180deg,#1a6bb5,#74b9ff)','clear-night':'linear-gradient(180deg,#0a0a2e,#2C3E7A)','partlycloudy':'linear-gradient(180deg,#0984e3,#74b9ff)','cloudy':'linear-gradient(180deg,#636e72,#b2bec3)','rainy':'linear-gradient(180deg,#1a6bb5,#4a9eed)','pouring':'linear-gradient(180deg,#1e3799,#3d7abf)','snowy':'linear-gradient(180deg,#89b4cc,#d0e8f5)','windy':'linear-gradient(180deg,#0984e3,#00cec9)','fog':'linear-gradient(180deg,#778ca3,#b2bec3)','lightning':'linear-gradient(180deg,#e17055,#fdcb6e)','snowy-rainy':'linear-gradient(180deg,#4a9eed,#d0e8f5)','hail':'linear-gradient(180deg,#2d3436,#636e72)'};
            var gradient = gr[state] || gr['sunny'];
            
            var pill = function(bg, icon, label, sub) {
              return `
                <div style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.5);border-radius:100px;padding:9px 35px 9px 9px;box-shadow:0 2px 16px rgba(0,0,0,0.09);white-space:nowrap;">
                  <div style="width:62px;height:62px;min-width:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${bg};">
                    <ha-icon icon="${icon}" style="color:white;--mdc-icon-size:30px;"></ha-icon>
                  </div>
                  ${sub ? `<div><div style="font-size:18px;font-weight:600;color:oklch(20% 0.018 45);line-height:1.3;">${label}</div><div style="font-size:13px;color:oklch(40% 0.015 48);line-height:1.3;">${sub}</div></div>` : `<span style="font-size:18px;font-weight:600;color:oklch(20% 0.018 45);">${label}</span>`}
                </div>
              `;
            };
            
            var wp = `
              <div style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.5);border-radius:100px;padding:9px 35px 9px 9px;box-shadow:0 2px 16px rgba(0,0,0,0.09);white-space:nowrap;">
                <div style="width:62px;height:62px;min-width:62px;border-radius:50%;background:${gradient};display:flex;align-items:center;justify-content:center;">
                  <img src="${iconSrc}" width="40" height="40" />
                </div>
                <div>
                  <div style="font-size:18px;font-weight:600;color:oklch(20% 0.018 45);line-height:1.3;">${temp}</div>
                  <div style="font-size:13px;color:oklch(40% 0.015 48);line-height:1.3;">${cond}</div>
                </div>
              </div>
            `;
            
            return `
              <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;gap:16px;padding:0 36px;box-sizing:border-box;">
                ${pill('#9B59B6', 'mdi:layers-triple', 'Scenes')}
                ${pill('#2B8FE0', 'mdi:lightbulb', 'Lights')}
                ${pill('oklch(58% 0.012 50)', 'mdi:cog', 'System')}
                ${pill('#E8793A', 'mdi:thermometer', '72°F', 'Heat to 70°')}
                ${pill('#2B8FE0', 'mdi:lock', 'Locked', 'All Doors')}
                ${wp}
              </div>
            `;
          ]]]


# =========================================
# 2. KIOSK MODE CONFIG
# =========================================
kiosk_mode:
  kiosk: true

# =========================================
# 3. VIEWS
# =========================================
views:

  # -----------------------------------------
  # VIEW: HOME
  # -----------------------------------------
  - title: Home
    path: home
    panel: true
    background: "oklch(96% 0.008 60)"
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        card_mod:
          style: |
            :host { display: block; }
            ha-card { overflow: hidden; }
        layout:
          grid-template-columns: 210px 1fr
          grid-template-rows: calc(100vh - 56px - 160px) 160px
          height: calc(100vh - 56px)
          width: 100vw
          margin: 0
          padding: 0
          gap: 0
          align-content: stretch
        cards:
          - type: vertical-stack
            view_layout:
              grid-column: 1
              grid-row: 1
            card_mod:
              style: |
                :host {
                  padding: 0 20px 28px 20px;
                  box-sizing: border-box;
                  height: calc(100vh - 56px - 160px);
                  overflow: hidden;
                  background: transparent;
                }
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                }
            cards:
              - type: custom:decluttering-card
                template: sidebar_menu
                variables:
                  - home_border: "#2B8FE0"

          - type: custom:layout-card
            layout_type: custom:grid-layout
            view_layout:
              grid-column: 2
              grid-row: 1
            layout:
              grid-template-columns: 1fr 1fr
              grid-template-rows: 1fr
              gap: 150px
            card_mod:
              style: |
                :host { padding: 0 60px 0 20px; box-sizing: border-box; }
