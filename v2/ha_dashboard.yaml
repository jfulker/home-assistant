                    </div>
              - type: custom:button-card
                entity: media_player.family_room
                show_name: false
                show_icon: false
                show_state: false
                tap_action:
                  action: more-info
                styles:
                  card:
                    - background: "rgba(255,255,255,0.2)"
                    - border-radius: 18px
                    - box-shadow: "0 4px 32px rgba(0,0,0,0.10), 0 1px 6px rgba(0,0,0,0.06)"
                    - padding: 0
                    - height: calc(100vh - 56px - 160px - 144px)
                    - margin-top: 100px
                    - position: relative
                    - overflow: hidden
                  custom_fields:
                    content:
                      - position: absolute
                      - top: 0
                      - left: 0
                      - right: 0
                      - bottom: 0
                      - display: block
                      - padding: 28px
                      - box-sizing: border-box
                custom_fields:
                  content: |
                    [[[
                      var e = states['media_player.family_room'];
                      if (!e) return '<div style="color:oklch(20% 0.018 45);font-size:20px;font-weight:400;">Media</div>';
                      var state = e.state;
                      var title = e.attributes.media_title || '';
                      var artist = e.attributes.media_artist || '';
                      var album = e.attributes.media_album_name || '';
                      var vol = e.attributes.volume_level ? Math.round(e.attributes.volume_level * 100) : 0;
                      var isPlaying = state === 'playing';
                      var artUrl = e.attributes.entity_picture || '';
                      var bg = artUrl ? 'linear-gradient(180deg,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.65) 100%),url(' + artUrl + ') center/cover' : 'linear-gradient(180deg,#1a6bb5,#74b9ff)';
                      var playIcon = isPlaying ? 'mdi:pause' : 'mdi:play';
                      return '<div style="width:100%;height:100%;background:' + bg + ';border-radius:18px;display:flex;flex-direction:column;justify-content:flex-end;box-sizing:border-box;padding:24px;">'
                        + '<div style="font-size:20px;font-weight:600;color:white;margin-bottom:4px;">' + (title || (state === 'off' ? 'Sonos' : 'Nothing Playing')) + '</div>'
                        + (artist ? '<div style="font-size:14px;color:rgba(255,255,255,0.75);margin-bottom:20px;">' + artist + (album ? ' · ' + album : '') + '</div>' : '<div style="margin-bottom:20px;"></div>')
                        + '<div style="display:flex;align-items:center;justify-content:space-between;">'
                        + '<div style="display:flex;gap:12px;align-items:center;">'
                        + '<ha-icon icon="mdi:skip-previous" style="color:rgba(255,255,255,0.8);--mdc-icon-size:28px;"></ha-icon>'
                        + '<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;"><ha-icon icon="' + playIcon + '" style="color:white;--mdc-icon-size:28px;"></ha-icon></div>'
                        + '<ha-icon icon="mdi:skip-next" style="color:rgba(255,255,255,0.8);--mdc-icon-size:28px;"></ha-icon>'
                        + '</div>'
                        + '<div style="display:flex;gap:8px;align-items:center;">'
                        + '<ha-icon icon="mdi:volume-minus" style="color:rgba(255,255,255,0.8);--mdc-icon-size:22px;"></ha-icon>'
                        + '<div style="font-size:14px;color:rgba(255,255,255,0.8);min-width:32px;text-align:center;">' + vol + '%</div>'
                        + '<ha-icon icon="mdi:volume-plus" style="color:rgba(255,255,255,0.8);--mdc-icon-size:22px;"></ha-icon>'
                        + '</div></div></div>';
                    ]]]
          - type: custom:decluttering-card
            template: footer
            view_layout:
              grid-column: 1 / 3
              grid-row: 2
