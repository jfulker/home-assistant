                      <div style="font-size:20px;font-weight:400;color:oklch(20% 0.018 45);margin-bottom:20px;">Home</div>
                      <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;height:calc(100% - 48px);"><div style="grid-row:1/3;background:#2B8FE0;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:20px;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;"><div><div style="font-size:15px;font-weight:600;color:white;margin-bottom:4px;">Light</div><div style="font-size:13px;color:rgba(255,255,255,0.8);">On</div></div><div style="display:flex;justify-content:flex-end;"><ha-icon icon="mdi:lightbulb" style="color:rgba(255,255,255,0.9);--mdc-icon-size:28px;"></ha-icon></div></div><div style="background:oklch(91.5% 0.013 60);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.07);padding:20px;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;"><div><div style="font-size:15px;font-weight:600;color:oklch(20% 0.018 45);margin-bottom:4px;">Security</div><div style="font-size:13px;color:oklch(40% 0.015 48);">Disarmed</div></div><div style="display:flex;justify-content:flex-end;"><ha-icon icon="mdi:shield-home" style="color:oklch(40% 0.015 48);--mdc-icon-size:28px;"></ha-icon></div></div><div style="background:#1AABB8;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:20px;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;"><div><div style="font-size:15px;font-weight:600;color:white;margin-bottom:4px;">Indoor Temp</div><div style="font-size:13px;color:rgba(255,255,255,0.8);">72°F</div></div><div style="display:flex;justify-content:flex-end;"><ha-icon icon="mdi:thermometer" style="color:rgba(255,255,255,0.9);--mdc-icon-size:28px;"></ha-icon></div></div></div>
                    </div>
              - type: custom:button-card
                name: Cameras
                show_name: true
                show_icon: false
                show_state: false
                show_entity_picture: false
                styles:
                  card:
                    - background: "rgba(255,255,255,0.2)"
                    - border-radius: 18px
                    - box-shadow: "0 4px 32px rgba(0,0,0,0.10), 0 1px 6px rgba(0,0,0,0.06)"
                    - padding: 28px
                    - height: calc(100vh - 56px - 160px - 144px)
                    - margin-top: 100px
                    - position: relative
                    - overflow: hidden
                    - box-sizing: border-box
                  name:
                    - font-size: 20px
                    - font-weight: 400
                    - color: "oklch(20% 0.018 45)"
                    - text-align: left
                    - position: absolute
                    - top: 28px
                    - left: 28px
                  custom_fields:
                    cam1:
                      - position: absolute
                      - top: 76px
                      - left: 28px
                      - right: 28px
                      - bottom: calc(50% + 6px)
                      - border-radius: 12px
                      - overflow: hidden
                    cam2:
                      - position: absolute
                      - top: calc(50% + 6px)
                      - left: 28px
                      - right: 28px
                      - bottom: 28px
                      - border-radius: 12px
                      - overflow: hidden
                custom_fields:
                  cam1: |
                    [[[
                      var e = states['camera.porch_snapshots_fluent'];
                      var url = e ? e.attributes.entity_picture : null;
                      if (!url) return '<div style="width:100%;height:100%;background:oklch(89% 0.016 58);border-radius:12px;display:flex;align-items:center;justify-content:center;"><ha-icon icon=&quot;mdi:cctv&quot; style=&quot;color:oklch(58% 0.012 50);--mdc-icon-size:36px;&quot;></ha-icon></div>';
                      return '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;display:block;" />';
                    ]]]
                  cam2: |
                    <div style="width:100%;height:100%;background:oklch(89% 0.016 58);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
                      <ha-icon icon="mdi:cctv" style="color:oklch(58% 0.012 50);--mdc-icon-size:36px;"></ha-icon>
                      <div style="font-size:13px;color:oklch(58% 0.012 50);">Camera 2</div>
                    </div>
          - type: custom:decluttering-card
            template: footer
            view_layout:
              grid-column: 1 / 3
              grid-row: 2
